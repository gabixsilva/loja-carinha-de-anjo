<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Carinha de Anjo — Loja Online</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--rosa:#f472b6;--rosa2:#ec4899;--lilas:#a78bfa;--azul:#60a5fa;--verde:#34d399;--amarelo:#fbbf24;--bg:#fdf4ff;--surface:#fff;--text:#1e1b4b;--muted:#7c6f9f;--border:#e9d5ff;--shadow:0 4px 24px rgba(167,139,250,.15)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
header{background:linear-gradient(135deg,#7c3aed,#ec4899);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(124,58,237,.3)}
.logo{display:flex;align-items:center;gap:8px}
.logo img{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.5)}
.logo-txt{font-family:'Baloo 2',cursive;font-size:16px;font-weight:800;color:#fff}
.cart-btn{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);border-radius:50px;padding:6px 12px;color:#fff;font-family:'Baloo 2',cursive;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;backdrop-filter:blur(8px)}
.cart-badge{background:#fbbf24;color:#1e1b4b;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800}
.hero{background:linear-gradient(160deg,#7c3aed,#ec4899);padding:24px 16px 32px;text-align:center;color:#fff}
.hero img{width:70px;height:70px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.6);margin-bottom:8px}
.hero h1{font-family:'Baloo 2',cursive;font-size:22px;font-weight:800;margin-bottom:4px}
.hero p{font-size:13px;opacity:.9}
.filtros{padding:14px 12px 4px;display:flex;flex-direction:column;gap:10px}
.filtro-label{font-family:'Baloo 2',cursive;font-weight:700;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:7px 14px;border-radius:50px;border:2px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.pill.ativo{border-color:var(--rosa2);background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff}
.produtos-section{padding:6px 10px 100px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.card{background:var(--surface);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);border:1.5px solid var(--border);cursor:pointer;transition:transform .15s}
.card:active{transform:scale(.97)}
.card-img{width:100%;aspect-ratio:1;background:linear-gradient(135deg,#f3e8ff,#fce7f3);display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-body{padding:5px 7px 7px}
.card-nome{font-family:'Baloo 2',cursive;font-weight:700;font-size:10px;color:var(--text);margin-bottom:1px;line-height:1.2}
.card-tam{font-size:9px;color:var(--muted);margin-bottom:3px}
.card-preco{font-family:'Baloo 2',cursive;font-weight:800;font-size:12px;color:var(--rosa2)}
.vazio{text-align:center;padding:40px 16px;color:var(--muted)}
.overlay{position:fixed;inset:0;background:rgba(30,27,75,.5);z-index:200;backdrop-filter:blur(4px);display:none}
.overlay.ativo{display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:20px 16px 36px;animation:slideUp .25s ease;position:relative}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-img{width:100%;aspect-ratio:1;border-radius:14px;background:linear-gradient(135deg,#f3e8ff,#fce7f3);display:flex;align-items:center;justify-content:center;font-size:60px;overflow:hidden;margin-bottom:12px}
.modal-img img{width:100%;height:100%;object-fit:cover}
.modal-nome{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;margin-bottom:2px}
.modal-preco{font-family:'Baloo 2',cursive;font-size:24px;font-weight:800;color:var(--rosa2);margin-bottom:12px}
.modal-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.tamanhos{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.tam-btn{width:40px;height:40px;border-radius:10px;border:2px solid var(--border);background:var(--surface);font-family:'Baloo 2',cursive;font-weight:700;font-size:12px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center}
.tam-btn.sel{border-color:var(--rosa2);background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff}
.tam-btn.esgotado{opacity:.3;cursor:not-allowed;text-decoration:line-through}
.qtd-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.qtd-btn{width:38px;height:38px;border-radius:50%;border:2px solid var(--border);background:var(--surface);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--text)}
.qtd-val{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;min-width:28px;text-align:center}
.btn-add{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;font-family:'Baloo 2',cursive;font-size:16px;font-weight:800;cursor:pointer}
.btn-add:disabled{opacity:.4;cursor:not-allowed}
.modal-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:var(--bg);border:none;font-size:16px;cursor:pointer}
.carrinho-overlay{position:fixed;inset:0;background:rgba(30,27,75,.5);z-index:300;backdrop-filter:blur(4px);display:none}
.carrinho-overlay.ativo{display:flex;align-items:flex-end;justify-content:center}
.carrinho-panel{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:92vh;display:flex;flex-direction:column;animation:slideUp .25s ease}
.carrinho-header{padding:16px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.carrinho-titulo{font-family:'Baloo 2',cursive;font-size:18px;font-weight:800}
.carrinho-body{flex:1;overflow-y:auto;padding:12px 16px}
.carrinho-item{display:flex;gap:10px;padding:10px 0;border-bottom:1.5px solid var(--border);align-items:center}
.carrinho-item-img{width:48px;height:48px;border-radius:10px;background:linear-gradient(135deg,#f3e8ff,#fce7f3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.carrinho-item-img img{width:100%;height:100%;object-fit:cover}
.carrinho-item-info{flex:1}
.carrinho-item-nome{font-weight:700;font-size:12px;margin-bottom:1px}
.carrinho-item-tam{font-size:10px;color:var(--muted)}
.carrinho-item-preco{font-family:'Baloo 2',cursive;font-weight:800;font-size:13px;color:var(--rosa2)}
.carrinho-item-rem{background:none;border:none;color:#f87171;font-size:16px;cursor:pointer;padding:3px}
.carrinho-footer{padding:12px 16px 28px;border-top:1.5px solid var(--border)}
.carrinho-total{display:flex;justify-content:space-between;align-items:center;font-family:'Baloo 2',cursive;font-size:17px;font-weight:800;margin-bottom:12px}
.btn-checkout{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;font-family:'Baloo 2',cursive;font-size:16px;font-weight:800;cursor:pointer}
.checkout-overlay{position:fixed;inset:0;background:var(--bg);z-index:400;overflow-y:auto;display:none}
.checkout-overlay.ativo{display:block}
.checkout-header{background:linear-gradient(135deg,#7c3aed,#ec4899);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.btn-voltar{background:rgba(255,255,255,.2);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.checkout-titulo{font-family:'Baloo 2',cursive;font-size:17px;font-weight:800;color:#fff}
.checkout-body{padding:16px 14px 100px}
.step-titulo{font-family:'Baloo 2',cursive;font-size:15px;font-weight:800;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.step-badge{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.entrega-card{padding:12px 14px;border-radius:12px;border:2px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:7px}
.entrega-card.sel{border-color:var(--rosa2);background:rgba(236,72,153,.04)}
.entrega-card-icon{font-size:22px}
.entrega-card-nome{font-weight:700;font-size:13px}
.entrega-card-desc{font-size:11px;color:var(--muted)}
.entrega-card-preco{font-family:'Baloo 2',cursive;font-weight:800;font-size:13px;color:var(--rosa2);margin-left:auto}
.bairros-select{width:100%;padding:11px 12px;border-radius:11px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;outline:none;margin-top:8px}
.campo{margin-bottom:10px}
.campo label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.campo input,.campo select{width:100%;padding:10px 12px;border-radius:10px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;outline:none}
.campo input:focus{border-color:var(--rosa2)}
.campos-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.resumo-box{background:var(--surface);border-radius:14px;border:1.5px solid var(--border);padding:14px;margin-bottom:14px}
.resumo-linha{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--border)}
.resumo-linha:last-child{border:none;font-family:'Baloo 2',cursive;font-size:16px;font-weight:800}
.resumo-linha span:last-child{font-weight:700;color:var(--rosa2)}
.pix-box{background:linear-gradient(135deg,rgba(124,58,237,.05),rgba(236,72,153,.05));border:2px solid var(--border);border-radius:14px;padding:18px;text-align:center}
.pix-titulo{font-family:'Baloo 2',cursive;font-size:16px;font-weight:800;margin-bottom:3px}
.pix-valor{font-family:'Baloo 2',cursive;font-size:26px;font-weight:800;color:var(--rosa2);margin-bottom:14px}
.pix-codigo{background:var(--bg);border:1.5px dashed var(--border);border-radius:10px;padding:10px;font-size:9px;word-break:break-all;color:var(--muted);margin-bottom:10px;text-align:left;max-height:70px;overflow:hidden}
.btn-copiar{width:100%;padding:12px;border-radius:12px;border:2px solid var(--rosa2);background:transparent;color:var(--rosa2);font-family:'Baloo 2',cursive;font-size:15px;font-weight:800;cursor:pointer;margin-bottom:8px}
.btn-copiar:hover{background:var(--rosa2);color:#fff}
.pix-instrucoes{font-size:11px;color:var(--muted);line-height:1.6;text-align:left;margin-bottom:14px}
.verificando{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:var(--muted);padding:10px}
.spinner{width:18px;height:18px;border:3px solid var(--border);border-top-color:var(--rosa2);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sucesso-box{text-align:center;padding:36px 16px}
.sucesso-emoji{font-size:70px;margin-bottom:12px;animation:bounce 1s ease infinite alternate}
@keyframes bounce{from{transform:scale(1)}to{transform:scale(1.08)}}
.sucesso-titulo{font-family:'Baloo 2',cursive;font-size:24px;font-weight:800;color:var(--text);margin-bottom:6px}
.sucesso-desc{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6}
.btn-wpp{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:14px;border:none;background:#25d366;color:#fff;font-family:'Baloo 2',cursive;font-size:16px;font-weight:800;cursor:pointer;text-decoration:none;margin-bottom:10px}
.btn-prosseguir{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;font-family:'Baloo 2',cursive;font-size:16px;font-weight:800;cursor:pointer;margin-top:6px}
.btn-prosseguir:disabled{opacity:.4;cursor:not-allowed}
.alert-box{padding:10px 14px;border-radius:10px;background:#fef3c7;border:1.5px solid #fbbf24;font-size:12px;color:#92400e;margin-bottom:10px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 16px;gap:10px;color:var(--muted)}
.loading-spinner{width:36px;height:36px;border:4px solid var(--border);border-top-color:var(--rosa2);border-radius:50%;animation:spin .8s linear infinite}
.transport-card{padding:10px 14px;border-radius:10px;border:2px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:6px}
.transport-card.sel{border-color:var(--rosa2)}
.transport-nome{font-weight:700;font-size:12px}
.transport-prazo{font-size:10px;color:var(--muted)}
.transport-preco{font-family:'Baloo 2',cursive;font-weight:800;font-size:13px;color:var(--rosa2);margin-left:auto}

/* ── ADMIN ── */
.admin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:none;align-items:center;justify-content:center}
.admin-overlay.ativo{display:flex}
.admin-panel{background:var(--surface);border-radius:20px;width:92%;max-width:520px;max-height:90vh;overflow-y:auto;padding:20px}
.admin-titulo{font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;color:var(--text);margin-bottom:16px;text-align:center}
.admin-secao{background:var(--bg);border-radius:12px;padding:14px;margin-bottom:14px}
.admin-secao-titulo{font-family:'Baloo 2',cursive;font-size:14px;font-weight:800;color:var(--text);margin-bottom:10px}
.admin-produto-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.admin-produto-img{width:44px;height:44px;border-radius:8px;object-fit:cover;background:var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:18px}
.admin-produto-img img{width:100%;height:100%;object-fit:cover}
.admin-produto-nome{flex:1;font-size:12px;font-weight:700}
.btn-foto{padding:5px 10px;border-radius:7px;border:1.5px solid var(--rosa2);background:transparent;color:var(--rosa2);font-size:11px;font-weight:700;cursor:pointer}
.btn-sm{padding:5px 10px;border-radius:7px;border:none;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;font-size:11px;font-weight:700;cursor:pointer}
.btn-danger-sm{padding:5px 10px;border-radius:7px;border:none;background:#e74c3c;color:#fff;font-size:11px;font-weight:700;cursor:pointer}
.pedido-card{padding:12px;border-radius:10px;border:1.5px solid var(--border);margin-bottom:8px;background:var(--surface)}
.pedido-status{font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;display:inline-block;margin-bottom:4px}
.pedido-status.pago{background:rgba(52,211,153,.15);color:#059669}
.pedido-status.estornado{background:rgba(248,113,113,.15);color:#dc2626}
.input-admin{width:100%;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);font-family:'Nunito',sans-serif;font-size:12px;outline:none;margin-bottom:6px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="/logo.png" alt="Carinha de Anjo">
    <div class="logo-txt">Carinha de Anjo</div>
  </div>
  <button class="cart-btn" onclick="abrirCarrinho()">
    🛒 <span class="cart-badge" id="cartBadge">0</span>
  </button>
</header>

<div class="hero">
  <img src="/logo.png" alt="Logo">
  <h1>👼 Moda Infantil com Amor</h1>
  <p>Roupinhas lindas para os seus pequenos anjos ✨</p>
</div>

<div class="filtros">
  <div>
    <div class="filtro-label">Gênero</div>
    <div class="pills" id="pillsGenero">
      <button class="pill ativo" onclick="filtrarGenero('Feminino',this)">👧 Feminino</button>
      <button class="pill" onclick="filtrarGenero('Masculino',this)">👦 Masculino</button>
    </div>
  </div>
  <div>
    <div class="filtro-label">Tamanho</div>
    <div class="pills" id="pillsIdade">
      <button class="pill ativo" onclick="filtrarIdade('todos',this)">Todos</button>
    </div>
  </div>
</div>

<div class="produtos-section">
  <div id="produtosContainer">
    <div class="loading"><div class="loading-spinner"></div>Carregando...</div>
  </div>
</div>

<!-- MODAL PRODUTO -->
<div class="overlay" id="overlayProduto" onclick="fecharModalClick(event)">
  <div class="modal" id="modalProduto">
    <button class="modal-close" onclick="fecharModalBtn()">✕</button>
    <div id="modalConteudo"></div>
  </div>
</div>

<!-- CARRINHO -->
<div class="carrinho-overlay" id="overlayCarrinho" onclick="fecharCarrinhoClick(event)">
  <div class="carrinho-panel">
    <div class="carrinho-header">
      <div class="carrinho-titulo">🛒 Meu Carrinho</div>
      <button style="background:none;border:none;font-size:20px;cursor:pointer" onclick="fecharCarrinho()">✕</button>
    </div>
    <div class="carrinho-body" id="carrinhoBody"></div>
    <div class="carrinho-footer">
      <div class="carrinho-total"><span>Total</span><span id="carrinhoTotal">R$ 0,00</span></div>
      <button class="btn-checkout" onclick="irCheckout()">Finalizar Compra →</button>
    </div>
  </div>
</div>

<!-- CHECKOUT -->
<div class="checkout-overlay" id="overlayCheckout">
  <div class="checkout-header">
    <button class="btn-voltar" onclick="voltarCheckout()">←</button>
    <div class="checkout-titulo" id="checkoutTitulo">Finalizar Compra</div>
  </div>
  <div class="checkout-body" id="checkoutBody"></div>
</div>

<!-- ADMIN -->
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="admin-titulo" style="margin:0">⚙️ Administração</div>
      <button onclick="fecharAdmin()" style="background:none;border:none;font-size:20px;cursor:pointer">✕</button>
    </div>
    <div id="adminConteudo"></div>
  </div>
</div>

<!-- Botão admin oculto (toque 5x no rodapé) -->
<div id="adminTrigger" style="position:fixed;bottom:0;right:0;width:60px;height:60px;z-index:99;opacity:0" onclick="adminToque()"></div>

<script>
const API = '';
const LOGO_BASE64 = '/logo.png';
const SENHA_ADMIN = 'carinha2025';

async function sincronizarFotos() {

    await fetch(API + '/api/estoque/sync', {

      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ produtos })
    });
  } catch(e) {}
}

function renderAdminPedidos() {
  const pedidos = JSON.parse(localStorage.getItem('cda_pedidos_online') || '[]');
  if(!pedidos.length) return '<div style="font-size:12px;color:var(--muted)">Nenhum pedido ainda.</div>';
  return pedidos.slice().reverse().map((p,i) =>
    '<div class="pedido-card">' +
      '<span class="pedido-status ' + (p.estornado ? 'estornado' : 'pago') + '">' + (p.estornado ? '🔴 Estornado' : '✅ Pago') + '</span>' +
      '<div style="font-size:12px;font-weight:700">' + p.cliente + '</div>' +
      '<div style="font-size:11px;color:var(--muted)">' + fmtR(p.total) + ' • ' + p.data + '</div>' +
      '<div style="font-size:11px;color:var(--muted);margin-top:2px">' + p.itens + '</div>' +
      (!p.estornado ? '<button class="btn-danger-sm" style="margin-top:6px" onclick="estornarPedido(' + (pedidos.length-1-i) + ')">💸 Estornar PIX</button>' : '') +
    '</div>'
  ).join('');
}

async function estornarPedido(idx) {
  const pedidos = JSON.parse(localStorage.getItem('cda_pedidos_online') || '[]');
  const pedido = pedidos[idx];
  if(!pedido || pedido.estornado) return;
  if(!confirm('Confirma o estorno de ' + fmtR(pedido.total) + ' para ' + pedido.cliente + '?')) return;
  try {
    const resp = await fetch(API + '/api/pix/estornar', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ pedido_id: pedido.pedidoId, valor: pedido.total })
    });
    const data = await resp.json();
    if(data.ok) {
      pedidos[idx].estornado = true;
      localStorage.setItem('cda_pedidos_online', JSON.stringify(pedidos));
      alert('✅ Estorno solicitado com sucesso!');
      renderAdmin();
    } else {
      alert('Erro no estorno: ' + (data.erro || 'Tente novamente'));
    }
  } catch(e) {
    alert('Erro de conexão. Tente novamente.');
  }
}

// ── PRODUTOS ──
async function carregarProdutos() {
  try {
    const resp = await fetch(API + '/api/estoque');
    produtos = await resp.json();
    if(!produtos.length) throw new Error('vazio');
  } catch(e) {
    produtos = [];
  }
  renderProdutos();
  renderPillsIdade();
}

function filtrarGenero(g, btn) {
  filtroGenero = g;
  document.querySelectorAll('#pillsGenero .pill').forEach(b => b.classList.remove('ativo'));
  btn.classList.add('ativo');
  filtroIdade = 'todos';
  renderProdutos();
  renderPillsIdade();
}

function filtrarIdade(i, btn) {
  filtroIdade = i;
  document.querySelectorAll('#pillsIdade .pill').forEach(b => b.classList.remove('ativo'));
  btn.classList.add('ativo');
  renderProdutos();
}

function renderPillsIdade() {
  const ORDEM = ['1','2','3','4','6','8','10','12'];
  const idades = new Set();
  produtos.filter(p => p.genero === filtroGenero).forEach(p => {
    (p.tamanhos||[]).forEach(t => { if(t.quantidade > 0 && ORDEM.includes(t.tamanho)) idades.add(t.tamanho); });
  });
  const sorted = ORDEM.filter(t => idades.has(t));
  const container = document.getElementById('pillsIdade');
  container.innerHTML = '<button class="pill' + (filtroIdade==='todos'?' ativo':'') + '" onclick="filtrarIdade(\'todos\',this)">Todos</button>';
  sorted.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'pill' + (filtroIdade===t?' ativo':'');
    btn.textContent = t + ' anos';
    btn.onclick = function(){ filtrarIdade(t, this); };
    container.appendChild(btn);
  });
}

function getProdutosFiltrados() {
  return produtos.filter(p => {
    if(p.genero !== filtroGenero && p.genero !== 'Unissex') return false;
    const tams = p.tamanhos || [];
    const temEstoque = tams.some(t => t.quantidade > 0) || (p.estoque_total || 0) > 0;
    if(!temEstoque) return false;
    if(filtroIdade !== 'todos') {
      return tams.some(t => t.tamanho === filtroIdade && t.quantidade > 0);
    }
    return true;
  });
}

function renderProdutos() {
  const container = document.getElementById('produtosContainer');
  const lista = getProdutosFiltrados();
  if(!lista.length) {
    container.innerHTML = '<div class="vazio"><div style="font-size:48px;margin-bottom:10px">🔍</div><div style="font-family:\'Baloo 2\',cursive;font-size:16px;font-weight:800">Nenhum produto encontrado</div><div style="font-size:12px;margin-top:4px">Tente outro filtro!</div></div>';
    return;
  }
  container.innerHTML = '<div class="grid">' + lista.map(p => {
    const ORDEM = ['1','2','3','4','6','8','10','12'];
    const tamsDisp = (p.tamanhos||[]).filter(t => t.quantidade > 0 && ORDEM.includes(t.tamanho)).map(t => t.tamanho + ' anos').join(' · ');
    return '<div class="card" onclick="abrirProduto(' + p.id + ')">' +
      '<div class="card-img">' + (p.foto ? '<img src="' + p.foto + '" alt="' + p.nome + '" loading="lazy">' : (p.emoji || '👕')) + '</div>' +
      '<div class="card-body">' +
        '<div class="card-nome">' + p.nome + '</div>' +
        '<div class="card-tam">' + tamsDisp + '</div>' +
        '<div class="card-preco">' + fmtR(p.preco) + '</div>' +
      '</div>' +
    '</div>';
  }).join('') + '</div>';
}

// ── MODAL PRODUTO ──
function abrirProduto(id) {
  produtoAtual = produtos.find(p => p.id === id);
  if(!produtoAtual) return;
  tamSel = ''; qtdSel = 1;
  renderModal();
  document.getElementById('overlayProduto').classList.add('ativo');
  document.body.style.overflow = 'hidden';
}

function renderModal() {
  const p = produtoAtual;
  const ORDEM = ['1','2','3','4','6','8','10','12'];
  const tams = (p.tamanhos||[]).filter(t => ORDEM.includes(t.tamanho));
  document.getElementById('modalConteudo').innerHTML =
    '<div class="modal-img">' + (p.foto ? '<img src="' + p.foto + '" alt="' + p.nome + '">' : (p.emoji||'👕')) + '</div>' +
    '<div class="modal-nome">' + p.nome + '</div>' +
    '<div class="modal-preco">' + fmtR(p.preco) + '</div>' +
    '<div class="modal-label">Tamanho</div>' +
    '<div class="tamanhos">' +
      tams.map(t => '<button class="tam-btn' + (tamSel===t.tamanho?' sel':'') + (t.quantidade===0?' esgotado':'') + '" onclick="' + (t.quantidade>0?'selecionarTam(\''+t.tamanho+'\')':'void(0)') + '">' + t.tamanho + '</button>').join('') +
    '</div>' +
    '<div class="modal-label">Quantidade</div>' +
    '<div class="qtd-row"><button class="qtd-btn" onclick="alterarQtd(-1)">−</button><div class="qtd-val" id="qtdVal">' + qtdSel + '</div><button class="qtd-btn" onclick="alterarQtd(1)">+</button></div>' +
    '<button class="btn-add" id="btnAdd" onclick="adicionarCarrinho()" ' + (!tamSel?'disabled':'') + '>' +
      (tamSel ? '🛒 Adicionar — ' + fmtR(produtoAtual.preco * qtdSel) : 'Selecione um tamanho') +
    '</button>';
}

function selecionarTam(t) { tamSel = t; renderModal(); }
function alterarQtd(d) {
  const tam = produtoAtual.tamanhos?.find(t => t.tamanho === tamSel);
  const max = tam ? tam.quantidade : 99;
  qtdSel = Math.max(1, Math.min(max, qtdSel + d));
  document.getElementById('qtdVal').textContent = qtdSel;
  const btn = document.getElementById('btnAdd');
  if(btn && tamSel) btn.textContent = '🛒 Adicionar — ' + fmtR(produtoAtual.preco * qtdSel);
}

function adicionarCarrinho() {
  if(!tamSel) return;
  const p = produtoAtual;
  const idx = carrinho.findIndex(c => c.id===p.id && c.tamanho===tamSel);
  if(idx >= 0) carrinho[idx].quantidade += qtdSel;
  else carrinho.push({id:p.id,nome:p.nome,tamanho:tamSel,preco:p.preco,quantidade:qtdSel,emoji:p.emoji||'👕',foto:p.foto||'',peso:p.peso||0.5,largura:p.largura||20,altura:p.altura||5,comprimento:p.comprimento||30});
  salvarCarrinho();
  fecharModalBtn();
  mostrarFeedback('✅ Adicionado ao carrinho!');
}

}

    (pedidoData.tipoEntrega==='transportadora' ?
      '<div style="margin-top:10px"><div class="modal-label">Digite seu CEP</div>' +
      '<div style="display:flex;gap:8px;margin-top:6px">' +
      '<input type="text" id="inputCep" placeholder="00000-000" maxlength="9" value="' + (pedidoData.cepBusca||'') + '" oninput="mascaraCep(this)" style="flex:1;padding:10px;border-radius:10px;border:2px solid var(--border);font-family:\'Nunito\',sans-serif;font-size:13px;outline:none">' +
      '<button onclick="calcularFrete()" style="padding:10px 14px;border-radius:10px;border:none;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;font-family:\'Baloo 2\',cursive;font-weight:700;cursor:pointer">Buscar</button></div>' +
      '<div id="transportLista" style="margin-top:8px"></div></div>' : '') +
    '<button class="btn-prosseguir" onclick="prosseguirEntrega()" ' + (!podeProsseguirEntrega()?'disabled':'') + '>Continuar →</button>';

  if(pedidoData.tipoEntrega==='motoboy' && pedidoData.bairroSel) {
    const sel = document.getElementById('bairroSel');
    if(sel) sel.value = pedidoData.bairroSel;

  if(pedidoData.tipoEntrega==='transportadora' && pedidoData.opcoesTransporte?.length) renderTransportadoras();

function selEntrega(tipo) { pedidoData.tipoEntrega=tipo; pedidoData.bairroSel=''; pedidoData.valorFrete=0; pedidoData.transportSel=null; renderCheckout(); }

function selecionarBairro(sel) {
  pedidoData.bairroSel = sel.value;
  const opt = sel.options[sel.selectedIndex];
  pedidoData.valorFrete = parseFloat(opt.dataset.valor)||0;
  const btn = document.querySelector('.btn-prosseguir');
  if(btn) btn.disabled = !podeProsseguirEntrega();
}

function podeProsseguirEntrega() {
  if(!pedidoData.tipoEntrega) return false;
  if(pedidoData.tipoEntrega==='motoboy') return !!pedidoData.bairroSel;
  if(pedidoData.tipoEntrega==='transportadora') return !!pedidoData.transportSel;
  return true;
}

function prosseguirEntrega() { if(!podeProsseguirEntrega()) return; checkoutStep=2; renderCheckout(); }

function mascaraCep(el) { let v=el.value.replace(/\D/g,''); if(v.length>5) v=v.slice(0,5)+'-'+v.slice(5,8); el.value=v; }

async function calcularFrete() {
  const cep = document.getElementById('inputCep')?.value.replace(/\D/g,'');
  if(!cep||cep.length!==8) { alert('Digite um CEP válido.'); return; }
  pedidoData.cepBusca = cep;
  document.getElementById('transportLista').innerHTML = '<div class="verificando"><div class="spinner"></div>Calculando...</div>';
  try {
    const resp = await fetch(API+'/api/frete/calcular',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cep_destino:cep,produtos:carrinho.map(c=>({id:c.id,peso:c.peso||0.5,largura:c.largura||20,altura:c.altura||5,comprimento:c.comprimento||30,preco:c.preco,quantidade:c.quantidade}))})});
    const opcoes = await resp.json();
    pedidoData.opcoesTransporte = opcoes;
    renderTransportadoras();
  } catch(e) {
    document.getElementById('transportLista').innerHTML = '<div class="alert-box">Erro ao calcular frete. Verifique o CEP.</div>';
  }
}

function renderTransportadoras() {
  const lista = document.getElementById('transportLista');
  if(!lista) return;
  const opcoes = pedidoData.opcoesTransporte||[];
  if(!opcoes.length) { lista.innerHTML='<div class="alert-box">Nenhuma opção disponível para este CEP.</div>'; return; }
  lista.innerHTML = opcoes.map((o,i) =>
    '<div class="transport-card' + (pedidoData.transportSel?.id===o.id?' sel':'') + '" onclick="selTransporte('+i+')">' +
      '<div><div class="transport-nome">'+o.empresa+' — '+o.nome+'</div><div class="transport-prazo">Prazo: '+o.prazo+' dias úteis</div></div>' +
      '<div class="transport-preco">'+fmtR(o.preco)+'</div></div>'
  ).join('');
  const btn = document.querySelector('.btn-prosseguir');
  if(btn) btn.disabled = !podeProsseguirEntrega();
}

function selTransporte(i) { pedidoData.transportSel=pedidoData.opcoesTransporte[i]; pedidoData.valorFrete=pedidoData.transportSel.preco; renderTransportadoras(); const btn=document.querySelector('.btn-prosseguir'); if(btn) btn.disabled=false; }

function renderStepDados(body) {
  const precisaEnd = pedidoData.tipoEntrega!=='retirada';
  body.innerHTML =
    '<div class="step-titulo"><div class="step-badge">2</div>Seus Dados</div>' +
    '<div class="campo"><label>Nome completo *</label><input type="text" id="fNome" placeholder="Seu nome completo" value="'+(pedidoData.nome||'')+'"></div>' +
    '<div class="campo"><label>WhatsApp *</label><input type="tel" id="fTel" placeholder="(79) 99999-9999" value="'+(pedidoData.telefone||'')+'"></div>' +
    (precisaEnd ?
      '<div class="step-titulo" style="margin-top:16px"><div class="step-badge">📍</div>Endereço de Entrega</div>' +
      '<div class="campo"><label>CEP *</label><div style="display:flex;gap:6px"><input type="text" id="fCep" placeholder="00000-000" maxlength="9" value="'+(pedidoData.endCep||'')+'" oninput="mascaraCep(this)" style="flex:1"><button onclick="buscarCep()" style="padding:10px 12px;border-radius:10px;border:none;background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;font-family:\'Baloo 2\',cursive;font-weight:700;cursor:pointer;font-size:12px">Buscar</button></div></div>' +
      '<div class="campo"><label>Rua *</label><input type="text" id="fRua" placeholder="Rua / Avenida" value="'+(pedidoData.endRua||'')+'"></div>' +
      '<div class="campos-row"><div class="campo"><label>Número *</label><input type="text" id="fNum" placeholder="123" value="'+(pedidoData.endNum||'')+'"></div><div class="campo"><label>Complemento</label><input type="text" id="fComp" placeholder="Apto..." value="'+(pedidoData.endComp||'')+'"></div></div>' +
      '<div class="campo"><label>Bairro *</label><input type="text" id="fBairro" placeholder="Bairro" value="'+(pedidoData.endBairro||'')+'"></div>' +
      '<div class="campos-row"><div class="campo"><label>Cidade *</label><input type="text" id="fCidade" placeholder="Cidade" value="'+(pedidoData.endCidade||'Aracaju')+'"></div><div class="campo"><label>Estado</label><input type="text" id="fEstado" placeholder="SE" maxlength="2" value="'+(pedidoData.endEstado||'SE')+'"></div></div>'
    : '') +
    '<button class="btn-prosseguir" onclick="prosseguirDados()">Continuar →</button>';
}

async function buscarCep() {
  const cep = document.getElementById('fCep')?.value.replace(/\D/g,'');
  if(!cep||cep.length!==8) return;
  try {
    const resp = await fetch(API+'/api/cep/'+cep);
    const d = await resp.json();
    if(!d.erro) {
      if(document.getElementById('fRua')) document.getElementById('fRua').value=d.logradouro||'';
      if(document.getElementById('fBairro')) document.getElementById('fBairro').value=d.bairro||'';
      if(document.getElementById('fCidade')) document.getElementById('fCidade').value=d.localidade||'';
      if(document.getElementById('fEstado')) document.getElementById('fEstado').value=d.uf||'';
      pedidoData.endRua=d.logradouro||''; pedidoData.endBairro=d.bairro||''; pedidoData.endCidade=d.localidade||''; pedidoData.endEstado=d.uf||'';
    }
  } catch(e) {}
}

function prosseguirDados() {
  const nome = document.getElementById('fNome')?.value.trim();
  const tel = document.getElementById('fTel')?.value.trim();
  if(!nome||!tel) { alert('Preencha nome e WhatsApp!'); return; }
  pedidoData.nome=nome; pedidoData.telefone=tel;
  if(pedidoData.tipoEntrega!=='retirada') {
    const rua=document.getElementById('fRua')?.value.trim(), num=document.getElementById('fNum')?.value.trim(), bairro=document.getElementById('fBairro')?.value.trim(), cidade=document.getElementById('fCidade')?.value.trim();
    if(!rua||!num||!bairro||!cidade) { alert('Preencha o endereço completo!'); return; }
    pedidoData.endRua=rua; pedidoData.endNum=num; pedidoData.endComp=document.getElementById('fComp')?.value.trim()||'';
    pedidoData.endBairro=bairro; pedidoData.endCidade=cidade; pedidoData.endEstado=document.getElementById('fEstado')?.value.trim()||'SE';
    pedidoData.endCep=document.getElementById('fCep')?.value.trim()||'';
  }
  checkoutStep=3; renderCheckout();
}

async function renderStepPagamento(body) {
  const subtotal = carrinho.reduce((s,c)=>s+c.preco*c.quantidade,0);
  const frete = pedidoData.valorFrete||0;
  const total = subtotal+frete;
  body.innerHTML =
    '<div class="step-titulo"><div class="step-badge">3</div>Resumo do Pedido</div>' +
    '<div class="resumo-box">' +
      carrinho.map(c=>'<div class="resumo-linha"><span>'+c.quantidade+'× '+c.nome+' ('+c.tamanho+')</span><span>'+fmtR(c.preco*c.quantidade)+'</span></div>').join('') +
      (frete>0?'<div class="resumo-linha"><span>Frete</span><span>'+fmtR(frete)+'</span></div>':'') +
      '<div class="resumo-linha"><span>Total</span><span>'+fmtR(total)+'</span></div>' +
    '</div>' +
    '<div id="pixArea"><div class="verificando"><div class="spinner"></div>Gerando PIX...</div></div>';
  await gerarPix(total);
}

async function gerarPix(total) {
  const pixArea = document.getElementById('pixArea');
  try {
    const pedidoPayload = {
      cliente:{nome:pedidoData.nome,telefone:pedidoData.telefone.replace(/\D/g,''),email:''},
      itens:carrinho.map(c=>({id:String(c.id),nome:c.nome,tamanho:c.tamanho,preco:c.preco,quantidade:c.quantidade})),
      endereco:{rua:pedidoData.endRua||'Retirada na loja',numero:pedidoData.endNum||'S/N',complemento:pedidoData.endComp||'',bairro:pedidoData.endBairro||pedidoData.bairroSel||'Centro',cidade:pedidoData.endCidade||'Aracaju',estado:pedidoData.endEstado||'SE',cep:pedidoData.endCep||pedidoData.cepBusca||'49000000'},
      entrega:{tipo:pedidoData.tipoEntrega,bairro:pedidoData.bairroSel||'',transportadora:pedidoData.transportSel?.nome||'',prazo:pedidoData.transportSel?.prazo||0,valor:pedidoData.valorFrete||0},
      total
    };
    const resp = await fetch(API+'/api/pix/gerar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pedido:pedidoPayload})});
    const data = await resp.json();
    if(!data.ok) throw new Error(data.erro||'Erro');
    pedidoData.pixCopiaECola=data.pix_copia_cola; pedidoData.pedidoId=data.pedido_id; pedidoData.totalFinal=total; pedidoData.pedidoPayload=pedidoPayload;
    pixArea.innerHTML =
      '<div class="pix-box">' +
        '<div class="pix-titulo">💠 Pague via PIX</div>' +
        '<div class="pix-valor">'+fmtR(total)+'</div>' +
        '<div class="pix-instrucoes">1. Copie o código abaixo<br>2. Abra seu banco ou carteira digital<br>3. Escolha <strong>PIX Copia e Cola</strong><br>4. Cole o código e confirme<br><br>⏱️ Expira em <strong>30 minutos</strong></div>' +
        '<div class="pix-codigo" id="pixCodigo">'+data.pix_copia_cola+'</div>' +
        '<button class="btn-copiar" onclick="copiarPix()">📋 Copiar código PIX</button>' +
        '<div class="verificando" id="statusVerif"><div class="spinner"></div>Aguardando pagamento...</div>' +
      '</div>';
    iniciarVerificacao(data.pedido_id, pedidoPayload);
  } catch(e) {
    pixArea.innerHTML = '<div class="alert-box">Erro ao gerar PIX. Tente novamente.</div><button class="btn-prosseguir" onclick="gerarPix('+total+')">Tentar novamente</button>';
  }
}

async function copiarPix() {
  try { await navigator.clipboard.writeText(pedidoData.pixCopiaECola); mostrarFeedback('✅ Código copiado!'); }
  catch(e) {}
}

function iniciarVerificacao(pedidoId, payload) {
  if(verificacaoInterval) clearInterval(verificacaoInterval);
  verificacaoInterval = setInterval(async () => {
    try {
      const resp = await fetch(API+'/api/pix/verificar/'+pedidoId);
      const data = await resp.json();
      if(data.pago) { clearInterval(verificacaoInterval); await confirmarPedido(payload); }
    } catch(e) {}
  }, 5000);
}

async function confirmarPedido(payload) {
  try {
    const resp = await fetch(API+'/api/pedido/confirmar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pedido:payload})});
    const data = await resp.json();
    pedidoData.whatsappLink = data.whatsapp;
    // Salvar pedido local para admin
    const pedidos = JSON.parse(localStorage.getItem('cda_pedidos_online')||'[]');
    pedidos.push({cliente:payload.cliente.nome,total:payload.total,data:new Date().toLocaleDateString('pt-BR'),itens:payload.itens.map(it=>it.quantidade+'× '+it.nome+' ('+it.tamanho+')').join(', '),pedidoId:pedidoData.pedidoId,estornado:false});
    localStorage.setItem('cda_pedidos_online', JSON.stringify(pedidos));
    carrinho=[]; salvarCarrinho();
    renderSucesso();
  } catch(e) { renderSucesso(); }
}

function renderSucesso() {
  document.getElementById('checkoutTitulo').textContent='✅ Pedido Confirmado!';
  document.getElementById('checkoutBody').innerHTML =
    '<div class="sucesso-box">' +
      '<div class="sucesso-emoji">🎉</div>' +
      '<div class="sucesso-titulo">Pagamento Confirmado!</div>' +
      '<div class="sucesso-desc">Seu pedido foi recebido! Clique abaixo para abrir o WhatsApp e finalizar com a gente. Vamos separar suas peças com carinho! 💕</div>' +
      '<a class="btn-wpp" href="'+(pedidoData.whatsappLink||'#')+'" target="_blank">💬 Abrir WhatsApp</a>' +
      '<button onclick="voltarLoja()" style="width:100%;padding:12px;border-radius:12px;border:2px solid var(--border);background:transparent;color:var(--muted);font-family:\'Baloo 2\',cursive;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px">Continuar comprando</button>' +
    '</div>';
}

function voltarLoja() { document.getElementById('overlayCheckout').classList.remove('ativo'); document.body.style.overflow=''; atualizarBadge(); }

// ── UTILS ──
function fmtR(v) { return 'R$ '+Number(v).toFixed(2).replace('.',','); }
function mostrarFeedback(msg) {
  const el = document.createElement('div');
  el.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e1b4b;color:#fff;padding:10px 18px;border-radius:50px;font-family:\'Baloo 2\',cursive;font-weight:700;font-size:13px;z-index:999;white-space:nowrap';
  el.textContent=msg; document.body.appendChild(el); setTimeout(()=>el.remove(),2000);
}

// ── INIT ──
atualizarBadge();
carregarProdutos();
</script>
</body>
</html>
